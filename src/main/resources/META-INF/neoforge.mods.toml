modLoader="javafml" #mandatory
loaderVersion="${loader_version_range}" #mandatory
license="${mod_license}"
[[mods]] #mandatory
modId="${mod_id}" #mandatory
version="${mod_version}" #mandatory
displayName="${mod_name}" #mandatory
authors="Ayar"
description='''
Allows the Trade Post for MineColonies recycler building to handle Apotheosis salvage and socketed gems.
'''
[[dependencies.${mod_id}]] #optional
    modId="neoforge" #mandatory
    type="required" #mandatory
    versionRange="[${neo_version},)" #mandatory
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="mctradepost"
    type="required"
    versionRange="[1.05.015,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="apotheosis"
    type="required"
    versionRange="[0,)"
    ordering="AFTER"
    side="BOTH"
